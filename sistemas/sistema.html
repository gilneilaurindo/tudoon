    const SoundEngine = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playTone(freq, type, duration, vol = 0.1) {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + duration);
        },
        playSuccess() { this.init(); this.playTone(440, 'sine', 0.1, 0.1); setTimeout(() => this.playTone(660, 'sine', 0.2, 0.1), 100); },
        playPop() { this.init(); this.playTone(800, 'sine', 0.05, 0.05); },
        playAlert() { this.init(); this.playTone(300, 'sawtooth', 0.1, 0.1); setTimeout(() => this.playTone(200, 'sawtooth', 0.2, 0.1), 100); },

            this.init();

            setTimeout(() => this.playTone(1318.51, 'sine', 0.2, 0.15), 80); // E6
        },
        playSiren() {
            this.init();
            for(let i=0; i<4; i++) {
                setTimeout(() => this.playTone(800, 'square', 0.4, 0.15), i*800);
                setTimeout(() => this.playTone(600, 'square', 0.4, 0.15), (i*800)+400);
            }
        }

    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `slide-in-right p-4 rounded-lg border backdrop-blur-md text-white font-medium text-sm flex items-center shadow-lg pointer-events-auto ${type === 'success' ? 'bg-green-900/90 border-green-500' : (type === 'warning' ? 'bg-yellow-900/90 border-yellow-500' : (type === 'error' ? 'bg-red-900/90 border-red-500' : 'bg-blue-900/90 border-brand'))}`;
        toast.innerHTML = `<i class="fa-solid fa-${type==='success'?'check-circle':(type==='warning'?'triangle-exclamation':(type==='error'?'radiation':'info-circle'))} mr-2 text-lg"></i> ${msg}`;
        container.appendChild(toast);
        
        if(type === 'success') SoundEngine.playSuccess();
        else if(type === 'warning' || type === 'error') SoundEngine.playAlert();
        else SoundEngine.playPop();

        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);

    function addSacola(valor) {
        carrinhoTotal += valor;
        document.getElementById('sacola-total').innerText = `R$ ${carrinhoTotal.toFixed(2).replace('.', ',')}`;
        SoundEngine.playCoin();
        vendasAtuais += valor;
        let faltam = metaDiaria - vendasAtuais;
        if(faltam < 0) faltam = 0;
        let pct = (vendasAtuais / metaDiaria) * 100;
        if(pct > 100) pct = 100;

        document.getElementById('faltam-text').innerText = faltam === 0 ? 'META BATIDA! 🚀' : `Faltam: R$ ${faltam.toFixed(2).replace('.', ',')}`;
        document.getElementById('pct-text').innerText = `${Math.floor(pct)}%`;
        document.getElementById('progress-bar').style.width = `${pct}%`;
        document.getElementById('comissao-text').innerText = `R$ ${(vendasAtuais * 0.08).toFixed(2).replace('.', ',')}`;

        const banner = document.getElementById('vendedor-banner');
        banner.classList.add('scale-[1.01]', 'shadow-[0_0_30px_rgba(59,130,246,0.8)]');
        setTimeout(() => banner.classList.remove('scale-[1.01]', 'shadow-[0_0_30px_rgba(59,130,246,0.8)]'), 300);
        
        if(faltam === 0) {
            banner.className = "bg-gradient-to-r from-green-600 to-green-400 p-0.5 rounded-xl shadow-[0_0_30px_rgba(34,197,94,0.8)] transition-all duration-300";
            document.getElementById('progress-bar').classList.replace('bg-brand', 'bg-white');
            document.getElementById('pct-text').classList.replace('text-brand-light', 'text-white');
            SoundEngine.playSuccess();
        }
    }

    function sendCopilotScript(encodedText) {
        document.getElementById('objection-menu').classList.add('hidden');
        const text = decodeURIComponent(encodedText);
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        chatDatabase[activeChatId].history.push({type: 'me', text, time});
        appendMyMsg(text, time);
        SoundEngine.playPop();
        document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
        setTimeout(() => simulateClientReply(), 2500);
    }

    function handleSend() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        chatDatabase[activeChatId].history.push({type: 'me', text, time});
        appendMyMsg(text, time);
        SoundEngine.playPop();
        input.value = '';
        document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
        setTimeout(() => simulateClientReply(), 2500);
    }

    function simulateClientReply() {
        const c = document.getElementById('chat-messages');
        c.innerHTML += `<div id="typing-indicator" class="flex justify-start mb-2 fade-in"><div class="bg-[#202c33] p-3 rounded-lg rounded-tl-none border border-gray-700 flex space-x-1"><div class="w-1 h-1 bg-gray-400 rounded-full typing-dot"></div><div class="w-1 h-1 bg-gray-400 rounded-full typing-dot"></div></div></div>`;
        c.scrollTop = c.scrollHeight;
        
        setTimeout(() => {
            if(document.getElementById('typing-indicator')) document.getElementById('typing-indicator').remove();
            const replyText = "Legal! Quero esse sim.";
            const replyTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            chatDatabase[activeChatId].history.push({type: 'client', text: replyText, time: replyTime});
            appendClientMsg(replyText, replyTime);
            SoundEngine.playSuccess(); 
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
            renderChatList(); 
        }, 2000);
    }

    function appendMyMsg(text, time, isBot = false) {
        let icon = isBot ? `<i class="fa-solid fa-robot mr-1 text-[9px] text-green-300"></i>` : '';
        document.getElementById('chat-messages').innerHTML += `<div class="flex justify-end mb-2 fade-in"><div class="bg-[#005c4b] text-white p-2.5 rounded-lg max-w-[85%] shadow-sm relative border border-transparent rounded-tr-none"><p class="text-[12px] leading-relaxed break-words">${text}</p><span class="text-[9px] text-gray-300 flex items-center justify-end mt-1">${icon} ${time} <i class="fa-solid fa-check-double text-[#53bdeb] ml-1"></i></span></div></div>`;
    }

    function appendClientMsg(text, time) {
        document.getElementById('chat-messages').innerHTML += `<div class="flex justify-start mb-2 fade-in"><div class="bg-[#202c33] text-[#e9edef] p-2.5 rounded-lg max-w-[85%] shadow-sm border border-gray-700 rounded-tl-none"><p class="text-[12px] leading-relaxed break-words">${text}</p><span class="text-[9px] text-gray-400 flex justify-end mt-1">${time}</span></div></div>`;
    }

        let tbody = document.getElementById('team-table-body');
        teamDatabase.forEach(user => {
            let statusColor = user.status === 'Ocioso' ? 'text-red-400 bg-red-900/30' : (user.status === 'Pausa' ? 'text-yellow-500 bg-yellow-900/30' : 'text-green-400 bg-green-900/30');
            tbody.innerHTML += `<tr><td class="p-4 text-white"><img src="https://i.pravatar.cc/150?img=${user.img}" class="w-8 h-8 rounded-full inline mr-2 border border-gray-600"> ${user.name}</td><td class="p-4"><span class="px-2 py-1 rounded text-[10px] font-bold uppercase border border-gray-700 ${statusColor}">${user.status}</span></td><td class="p-4 font-bold text-white">R$ ${user.vendas.toLocaleString('pt-BR')}</td><td class="p-4 text-gray-400">${user.tma}</td></tr>`;
        });
    }

    /* ================================================================================= */
    /* OUTROS MÓDULOS (Analista, CEO)                                                    */
    /* ================================================================================= */
    function renderAnalistaImportacao(container) { container.innerHTML = `<div class="fade-in max-w-4xl mx-auto py-6"><div class="bg-gradient-to-r from-purple-900/50 to-transparent p-4 rounded-xl border-l-4 border-purple-500 flex justify-between items-center mb-6"><div><h4 class="text-white font-bold"><i class="fa-solid fa-broom text-purple-400 mr-2"></i> Qualidade de Dados</h4><p class="text-xs text-gray-300">14% de CPFs inválidos. Limpeza recomendada.</p></div><button class="bg-purple-600 text-white px-4 py-2 rounded text-xs font-bold hover:bg-purple-500" onclick="showToast('Higienização iniciada.', 'success')">Limpar Base</button></div><div class="glass-panel p-8 rounded-xl border border-purple-900/30 text-center cursor-pointer hover:bg-purple-900/5 transition-colors" onclick="showToast('Upload de CSV bloqueado na versão demo.', 'warning')"><i class="fa-solid fa-file-csv text-6xl text-gray-500 mb-4"></i><h3 class="text-xl font-bold text-white">Upload Base (.CSV)</h3></div></div>`; }

    function renderGerenteDashboard(container) { container.innerHTML = `<div class="fade-in space-y-6 pb-6"><div class="bg-gradient-to-r from-red-900/40 to-transparent p-4 rounded-xl border-l-4 border-red-500 flex justify-between items-center"><div><h4 class="text-white font-bold"><i class="fa-solid fa-chart-line text-red-400 mr-2"></i> Alerta de Rentabilidade (C.A.C.)</h4><p class="text-xs text-gray-300">O Custo de Aquisição subiu 12% nas últimas 4 horas.</p></div><button class="bg-dark-bg border border-gray-600 text-white px-4 py-2 rounded text-xs font-bold" onclick="showToast('Campanhas ruins pausadas no Meta Ads.', 'success')">Pausar Campanhas</button></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4"><div class="glass-panel p-4 rounded-xl border border-gray-700"><p class="text-[9px] text-gray-400 font-bold uppercase">Receita Mensal</p><h3 class="text-xl font-black text-white">R$ 412k</h3></div><div class="glass-panel p-4 rounded-xl border border-gray-700"><p class="text-[9px] text-gray-400 font-bold uppercase">CAC Atual</p><h3 class="text-xl font-black text-red-400">R$ 38,50</h3></div></div><div class="glass-panel p-5 rounded-xl border-l-4 border-green-500 bg-[#111b21]"><h3 class="font-bold text-white text-sm mb-4"><i class="fa-solid fa-calculator text-green-400 mr-2"></i> Simulador de Cenários</h3><div class="flex gap-6 items-center"><div class="w-1/2"><div class="flex justify-between text-xs text-gray-300 mb-2"><span>Reduzir CAC Meta Ads</span> <span class="font-bold text-white">R$ 30,00</span></div><input type="range" min="15" max="50" step="0.5" value="30" class="w-full"></div><div class="w-1/2 bg-gray-900 p-4 rounded-lg text-center"><p class="text-[10px] uppercase text-gray-400 font-bold mb-1">Novo Lucro Mensal Projetado</p><h2 class="text-3xl font-black text-green-400">R$ 137.900</h2></div></div></div></div>`; }


    /* ================================================================================= */
    /* ENGENHEIRO INFRA (SECOPS) - SIMULADOR DE ATAQUE V8                                */
    /* ================================================================================= */
    function renderProgramadorInfra(container) {
        isUnderAttack = false;
        container.innerHTML = `
            <div class="fade-in space-y-6 pb-6 relative overflow-hidden h-full flex flex-col">
                <div class="scanline"></div>
                
                <div class="bg-gradient-to-r from-terminal-green/20 to-transparent p-0.5 rounded-xl border-l-4 border-terminal-green transition-all duration-300" id="secops-banner">
                    <div class="bg-[#0c0c0c] p-4 rounded-[10px] flex flex-col md:flex-row items-center justify-between gap-4">
                        <div class="flex items-center">
                            <i class="fa-solid fa-shield-virus text-terminal-green text-3xl mr-4" id="secops-icon"></i>
                            <div>
                                <h4 class="text-white font-bold font-mono text-sm" id="secops-title">PREVENÇÃO DE QUEDAS (SLA 99.9%)</h4>
                                <p class="text-xs text-gray-400 font-mono mt-1" id="secops-desc">Sistema operando em estabilidade. Monitorando tráfego malicioso e picos de acesso.</p>
                            </div>
                        </div>
                        <button class="bg-red-900/40 text-red-400 border border-red-900 hover:bg-red-600 hover:text-white px-4 py-2 rounded text-xs font-bold font-mono transition-colors t-tip" data-tip="<strong class='text-red-400 block'>Teste de Estresse:</strong> Simula um ataque de negação de serviço (DDoS) para testar seus reflexos." onclick="simulateDDoS()">
                            <i class="fa-solid fa-skull mr-1"></i> SIMULAR ATAQUE DDOS
                        </button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 font-mono shrink-0">
                    <div class="bg-[#0c0c0c] p-4 rounded border border-gray-800 transition-colors" id="card-cpu">
                        <p class="text-[10px] text-gray-500 mb-1">/// CPU LOAD</p>
                        <h3 class="text-2xl font-bold text-white" id="cpu-load">24%</h3>
                        <div class="w-full bg-gray-800 h-1 mt-2"><div id="cpu-bar" class="bg-terminal-green h-1 transition-all duration-300" style="width: 24%"></div></div>
                    </div>
                    <div class="bg-[#0c0c0c] p-4 rounded border border-gray-800 transition-colors" id="card-socket">
                        <p class="text-[10px] text-gray-500 mb-1">/// ACTIVE SOCKETS</p>
                        <h3 class="text-2xl font-bold text-brand-light" id="socket-count">1,245</h3>
                        <p class="text-[9px] text-gray-600 mt-1">Conexões Simultâneas</p>
                    </div>
                    <div class="bg-[#0c0c0c] p-4 rounded border border-gray-800">
                        <p class="text-[10px] text-gray-500 mb-1">/// DB LATENCY</p>
                        <h3 class="text-2xl font-bold text-white" id="db-latency">12ms</h3>
                        <p class="text-[9px] text-gray-600 mt-1">Tempo de Resposta</p>
                    </div>
                    <div class="bg-[#0c0c0c] p-4 rounded border border-gray-800 transition-colors" id="card-threat">
                        <p class="text-[10px] text-gray-500 mb-1">/// THREAT LEVEL</p>
                        <h3 class="text-2xl font-bold text-terminal-green" id="threat-level">SAFE</h3>
                        <p class="text-[9px] text-gray-600 mt-1" id="threat-desc">0 Bloqueios/s</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1 min-h-[300px]">
                    <div class="lg:col-span-2 bg-[#0c0c0c] rounded border border-gray-800 flex flex-col font-mono text-xs relative overflow-hidden">
                        <div class="bg-gray-900 border-b border-gray-800 p-2 flex items-center text-gray-500">
                            <i class="fa-solid fa-terminal mr-2"></i> WAF Access Logs (/var/log/nginx/access.log)
                        </div>
                        <div id="terminal-logs" class="p-4 flex-1 overflow-y-auto text-gray-400 space-y-1">
                            <div><span class="text-gray-600">[${new Date().toLocaleTimeString()}]</span> <span class="text-brand">INFO:</span> Conexão WPP API estabelecida (Worker #42)</div>
                        </div>
                    </div>
                    
                    <div class="bg-[#0c0c0c] p-5 rounded border border-gray-800 flex flex-col font-mono relative z-20">
                        <h3 class="font-bold text-white text-sm mb-4 border-b border-gray-800 pb-2"><i class="fa-solid fa-hammer text-terminal-green mr-2"></i> Ações de Mitigação</h3>
                        
                        <div class="space-y-4 flex-1">
                            <button class="w-full text-left bg-gray-900/50 p-3 rounded border border-gray-800 hover:border-terminal-green transition-colors t-tip" data-tip="Aumenta o poder do servidor instantaneamente." onclick="mitigateAttack('scale')">
                                <h4 class="text-xs text-white font-bold mb-1"><i class="fa-solid fa-server mr-1"></i> Force Auto-Scaling (+2 EC2)</h4>
                            </button>
                            
                            <button class="w-full text-left bg-gray-900/50 p-3 rounded border border-gray-800 hover:border-yellow-500 transition-colors t-tip" data-tip="Filtra robôs e IPs repetidos. Essencial contra DDoS." onclick="mitigateAttack('waf')">
                                <h4 class="text-xs text-yellow-500 font-bold mb-1"><i class="fa-solid fa-filter mr-1"></i> Ativar Rate Limiting (WAF)</h4>
                            </button>

                            <button class="w-full text-left bg-red-900/20 p-3 rounded border border-red-900/50 hover:bg-red-600 hover:text-white transition-colors mt-auto text-red-500 t-tip" data-tip="Último recurso. Congela o site para quem não for humano verificado." onclick="mitigateAttack('panic')">
                                <h4 class="text-xs font-bold mb-1"><i class="fa-solid fa-radiation mr-1"></i> Under Attack Mode (Panic)</h4>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        startNormalMonitoring();
    }

    function startNormalMonitoring() {
        const logsContainer = document.getElementById('terminal-logs');
        if(secOpsInterval) clearInterval(secOpsInterval);

        secOpsInterval = setInterval(() => {
            if(isUnderAttack) return; // Se estiver em ataque, a lógica é outra

            if(Math.random() > 0.7 && logsContainer) {
                logsContainer.innerHTML += `<div><span class="text-gray-600">[${new Date().toLocaleTimeString()}]</span> <span class="text-green-500">OK:</span> Cache Redis limpo (14ms).</div>`;
                logsContainer.scrollTop = logsContainer.scrollHeight;
            }

            let cpu = Math.floor(Math.random() * 15) + 15;
            document.getElementById('cpu-bar').style.width = `${cpu}%`;
            document.getElementById('cpu-load').innerText = `${cpu}%`;
            document.getElementById('socket-count').innerText = (1200 + Math.floor(Math.random() * 50)).toLocaleString('en-US');
            document.getElementById('db-latency').innerText = `${Math.floor(Math.random() * 5) + 10}ms`;
        }, 1500);
    }

    function simulateDDoS() {
        if(isUnderAttack) return;
        isUnderAttack = true;
        SoundEngine.playSiren();
        
        // Efeitos Visuais de Alerta
        document.getElementById('main-body').classList.add('ddos-attack');
        document.getElementById('secops-banner').className = "bg-gradient-to-r from-red-900 to-red-600 p-0.5 rounded-xl border-l-4 border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.8)]";
        document.getElementById('secops-icon').className = "fa-solid fa-triangle-exclamation text-white text-4xl mr-4 animate-ping";
        document.getElementById('secops-title').innerText = "CRITICAL: ATAQUE DDoS DETECTADO";
        document.getElementById('secops-desc').innerHTML = "<strong class='text-white'>SISTEMA PRESTES A CAIR.</strong> O tráfego subiu 5000%. Aplique mitigação imediatamente!";
        
        document.getElementById('card-cpu').classList.add('border-red-500', 'bg-red-900/20');
        document.getElementById('cpu-bar').classList.replace('bg-terminal-green', 'bg-red-500');
        document.getElementById('card-socket').classList.add('border-red-500');
        document.getElementById('card-threat').classList.add('border-red-500', 'bg-red-900/20');
        
        document.getElementById('threat-level').innerText = "CRITICAL";
        document.getElementById('threat-level').className = "text-2xl font-bold text-red-500 animate-pulse";
        
        showToast('Ataque de Negação de Serviço em andamento! Servidores sobrecarregados.', 'error');

        const logsContainer = document.getElementById('terminal-logs');
        
        if(secOpsInterval) clearInterval(secOpsInterval);
        secOpsInterval = setInterval(() => {
            if(!isUnderAttack) return;
            // Valores subindo descontroladamente
            let cpu = 95 + Math.floor(Math.random() * 5);
            document.getElementById('cpu-bar').style.width = `${cpu}%`;
            document.getElementById('cpu-load').innerText = `${cpu}%`;
            document.getElementById('cpu-load').classList.add('text-red-500');

            let sockets = 15000 + Math.floor(Math.random() * 2000);
            document.getElementById('socket-count').innerText = sockets.toLocaleString('en-US');
            document.getElementById('socket-count').classList.add('text-red-500');
            
            document.getElementById('db-latency').innerText = `${Math.floor(Math.random() * 500) + 400}ms!`;
            document.getElementById('db-latency').classList.add('text-red-500');

            document.getElementById('threat-desc').innerText = `${Math.floor(Math.random() * 1000) + 5000} Req/s (Maliciosas)`;

            logsContainer.innerHTML += `<div><span class="text-gray-600">[${new Date().toLocaleTimeString()}]</span> <span class="text-red-500 font-bold">FATAL:</span> TCP Flood dropando pacotes na porta 443!</div>`;
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }, 800);
    }

    function mitigateAttack(type) {
        if(!isUnderAttack) {
            if(type==='scale') showToast('Auto-Scaling desnecessário. Tráfego normal.', 'info');
            return;
        }

        isUnderAttack = false;
        SoundEngine.playSuccess();
        document.getElementById('main-body').classList.remove('ddos-attack');
        
        let acaoText = type === 'waf' ? "Rate Limiting WAF aplicado" : (type === 'scale' ? "Auto-Scaling (+2 Instâncias) ativado" : "Panic Mode Ativado. Filtrando tráfego");
        showToast(`${acaoText}. Servidores estabilizando...`, 'success');

        const logsContainer = document.getElementById('terminal-logs');
        logsContainer.innerHTML += `<div><span class="text-gray-600">[${new Date().toLocaleTimeString()}]</span> <span class="text-terminal-green font-bold">SUCCESS:</span> Mitigação aplicada. Tráfego malicioso roteado para Blackhole.</div>`;
        
        // Reset Visuals
        document.getElementById('secops-banner').className = "bg-gradient-to-r from-terminal-green/20 to-transparent p-0.5 rounded-xl border-l-4 border-terminal-green transition-all duration-300";
        document.getElementById('secops-icon').className = "fa-solid fa-shield-virus text-terminal-green text-3xl mr-4";
        document.getElementById('secops-title').innerText = "PREVENÇÃO DE QUEDAS (SLA 99.9%)";
        document.getElementById('secops-desc').innerHTML = "Ataque mitigado com sucesso. Sistemas retornando à estabilidade.";

        document.getElementById('card-cpu').classList.remove('border-red-500', 'bg-red-900/20');
        document.getElementById('cpu-bar').classList.replace('bg-red-500', 'bg-terminal-green');
        document.getElementById('cpu-load').classList.remove('text-red-500');
        
        document.getElementById('card-socket').classList.remove('border-red-500');
        document.getElementById('socket-count').classList.remove('text-red-500');
        
        document.getElementById('card-threat').classList.remove('border-red-500', 'bg-red-900/20');
        document.getElementById('threat-level').innerText = "SAFE";
        document.getElementById('threat-level').className = "text-2xl font-bold text-terminal-green";
        document.getElementById('threat-desc').innerText = "0 Bloqueios/s";

        document.getElementById('db-latency').classList.remove('text-red-500');

        startNormalMonitoring();
    }
</script>
